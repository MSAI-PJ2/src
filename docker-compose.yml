# Local two-container smoke-test compose.
# NOTE: This file expects a local cogdist Dockerfile/model path when running the full stack.
services:
  cogdist:
    build:
      context: .
      dockerfile: services/cogdist/Dockerfile
    container_name: mlnode-cogdist
    environment:
      MODEL_PATH: /models/cogdist
      MODEL_VERSION: ${MODEL_VERSION:-single-label-12c-distill}
      MAX_LENGTH: "128"
      MAX_BATCH_SIZE: "32"
    volumes:
      - ${COGDIST_MODEL_PATH:-./cogdist_model_distilled}:/models/cogdist:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/readyz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  api-gateway:
    build:
      context: .
      dockerfile: src/gateway-container/api-gateway/Dockerfile
    container_name: mlnode-api-gateway
    environment:
      KLUE_API_URL: http://cogdist:8000
      REQUEST_TIMEOUT_SECONDS: "30"
      API_KEY_REQUIRED: "false"
      ALLOWED_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173"
      CONTENT_SAFETY_ENABLED: ${CONTENT_SAFETY_ENABLED:-false}
      CONTENT_SAFETY_ENDPOINT: ${CONTENT_SAFETY_ENDPOINT:-}
      CONTENT_SAFETY_KEY: ${CONTENT_SAFETY_KEY:-}
      CONTENT_SAFETY_THRESHOLD: ${CONTENT_SAFETY_THRESHOLD:-2}
      LLM_PROVIDER: local
      LOCAL_LLM_BASE_URL: http://192.168.1.155:8002/v1
      LOCAL_LLM_MODEL: nemotron-3-super-no-think
      LOCAL_LLM_API_KEY: dummy
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    depends_on:
      cogdist:
        condition: service_started